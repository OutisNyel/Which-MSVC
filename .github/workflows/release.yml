name: Build and Release

on:
  push:
    tags:
      - "v*"

env:
  PROJECT_FILE_PATH: .\Which-MSVC\Which-MSVC.vcxproj
  BUILD_CONFIGURATION: Release
  BUILD_TOOLSET: v143

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        shell: pwsh
        run: |
          msbuild ${{ env.PROJECT_FILE_PATH }} `
            /m `
            /t:Build `
            /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
            /p:Platform=${{ matrix.platform }} `
            /p:PlatformToolset=${{ env.BUILD_TOOLSET }} `
            /p:OutDir=${{ github.workspace }}\out\${{ matrix.platform }}\Release\

      - name: Package zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $platform = "${{ matrix.platform }}"
          $exePath = Join-Path "${{ github.workspace }}" "out\$platform\Release\which.exe"

          if (!(Test-Path -LiteralPath $exePath)) {
            throw "Build output not found: $exePath"
          }

          $packageDirName = "which-$tag-windows-$platform"
          $packageDir = Join-Path "${{ github.workspace }}" $packageDirName
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

          Copy-Item -LiteralPath $exePath -Destination (Join-Path $packageDir "which.exe")
          Copy-Item -LiteralPath ".\README.md" -Destination (Join-Path $packageDir "README.md")
          Copy-Item -LiteralPath ".\README.zh-CN.md" -Destination (Join-Path $packageDir "README.zh-CN.md")
          Copy-Item -LiteralPath ".\COPYING" -Destination (Join-Path $packageDir "COPYING")
          Copy-Item -LiteralPath ".\NEWS" -Destination (Join-Path $packageDir "NEWS")

          $zipPath = Join-Path "${{ github.workspace }}" "$packageDirName.zip"
          if (Test-Path -LiteralPath $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -Path "$packageDir\*" -DestinationPath $zipPath

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: which-${{ github.ref_name }}-windows-${{ matrix.platform }}.zip
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
